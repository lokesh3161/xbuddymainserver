<!DOCTYPE html>
<html>
<head><title>X Buddy API Test</title></head>
<body>
<h2>X Buddy API Debug Test</h2>
<button onclick="testBasic()">Test 1: Basic API Ping</button><br><br>
<button onclick="testOrder()">Test 2: Send Fake Order</button><br><br>
<pre id="output" style="background:#111;color:#0f0;padding:20px;min-height:100px"></pre>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbw85kwguGhPTrWW-JmVVCrnJS_tXX53EI7ZbHkkTs-qmHOlVOnLdSvs4_dre3A5kXQC/exec'

function log(msg) {
  document.getElementById('output').textContent += msg + '\n'
}

// Test 1: Basic ping
async function testBasic() {
  log('Testing basic ping...')
  try {
    const res = await fetch(API_URL)
    const text = await res.text()
    log('SUCCESS: ' + text)
  } catch(e) {
    log('ERROR: ' + e.message)
  }
}

// Test 2: Send a fake order
async function testOrder() {
  log('Sending fake order...')
  try {
    const params = new URLSearchParams({
      action: 'saveOrder',
      orderId: 'XB-TEST-' + Date.now(),
      name: 'Test User',
      fileName: 'test.pdf',
      totalPages: '5',
      copies: '1',
      printType: 'B&W',
      printSide: 'Single',
      amount: '10',
      transactionId: 'TXN123456',
    })
    const res = await fetch(`${API_URL}?${params.toString()}`)
    const text = await res.text()
    log('SUCCESS: ' + text)
  } catch(e) {
    log('ERROR: ' + e.message)
  }
}
</script>
</body>
</html>
